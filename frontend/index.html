<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp Frontend Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="container py-4">
    <section class="hero-card p-4 p-md-5 mb-4">
      <div class="d-flex flex-column flex-lg-row gap-4 align-items-lg-center justify-content-between">
        <div>
          <p class="eyebrow mb-2">Realtime Test UI</p>
          <h1 class="display-title mb-2">ChatApp Message Tester</h1>
          <p class="text-soft mb-0">Do Login User, user select, Then websocket message send/receive test করো।</p>
        </div>
        <div class="config-box">
          <label for="apiBase" class="form-label mb-1">Backend Base URL</label>
          <input id="apiBase" class="form-control" value="http://127.0.0.1:8000" />
          <small class="text-soft">Example: http://127.0.0.1:8000</small>
        </div>
      </div>
    </section>

    <section class="row g-4">
      <div class="col-12 col-xl-4">
        <div class="panel p-4 h-100">
          <div class="d-flex gap-2 mb-3">
            <button id="showLoginBtn" class="btn btn-main btn-sm active">Login</button>
            <button id="showRegisterBtn" class="btn btn-outline-light btn-sm">Register</button>
            <button id="logoutBtn" class="btn btn-outline-warning btn-sm ms-auto">Logout</button>
          </div>

          <form id="loginForm" class="vstack gap-3">
            <div>
              <label class="form-label">Username</label>
              <input type="text" id="loginUsername" class="form-control" required />
            </div>
            <div>
              <label class="form-label">Password</label>
              <input type="password" id="loginPassword" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-main w-100">Login</button>
          </form>

          <form id="registerForm" class="vstack gap-3 d-none mt-2">
            <div>
              <label class="form-label">Username</label>
              <input type="text" id="regUsername" class="form-control" required />
            </div>
            <div>
              <label class="form-label">Email</label>
              <input type="email" id="regEmail" class="form-control" required />
            </div>
            <div>
              <label class="form-label">First Name</label>
              <input type="text" id="regFirstName" class="form-control" />
            </div>
            <div>
              <label class="form-label">Last Name</label>
              <input type="text" id="regLastName" class="form-control" />
            </div>
            <div>
              <label class="form-label">Password</label>
              <input type="password" id="regPassword" class="form-control" required />
            </div>
            <div>
              <label class="form-label">Confirm Password</label>
              <input type="password" id="regPassword2" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-main w-100">Create Account</button>
          </form>

          <hr class="my-4 border-secondary-subtle" />

          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h6 mb-0">Current User</h2>
            <button id="reloadUsersBtn" class="btn btn-outline-light btn-sm">Reload Users</button>
          </div>
          <div id="meInfo" class="small text-soft mb-3">Not logged in</div>

          <h2 class="h6">Users</h2>
          <div id="usersList" class="list-group users-list"></div>
        </div>
      </div>

      <div class="col-12 col-xl-8">
        <div class="panel h-100 d-flex flex-column">
          <div class="chat-top p-3 border-bottom border-secondary-subtle">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <h2 id="chatWithTitle" class="h5 mb-1">No conversation selected</h2>
                <small id="chatMeta" class="text-soft">Select a user to start chatting</small>
              </div>
              <span id="socketStatus" class="badge text-bg-secondary">Disconnected</span>
            </div>
          </div>

          <div id="messagesBox" class="messages-box p-3 flex-grow-1"></div>

          <div id="typingText" class="px-3 pb-1 small text-soft min-h"></div>

          <form id="messageForm" class="message-form p-3 border-top border-secondary-subtle d-flex gap-2">
            <input id="messageInput" class="form-control" placeholder="Type your message..." autocomplete="off" />
            <button type="submit" class="btn btn-main">Send</button>
          </form>
        </div>
      </div>
    </section>

    <div id="toastWrap" class="toast-wrap"></div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
